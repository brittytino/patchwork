name: Build APK on Push

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | awk -F'"' '{print $2}')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | awk '{print $3}' | tr -d '\n')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "TAG_NAME=v$VERSION_NAME" >> $GITHUB_ENV
          echo "APK_NAME=patchwork-v${VERSION_NAME}.apk" >> $GITHUB_ENV
          echo "Detected version: $VERSION_NAME (code: $VERSION_CODE)"
        
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE_BASE64: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
      - name: Rename and Prepare APK
        run: |
          mkdir -p release-artifacts
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp app/build/outputs/apk/release/app-release.apk "release-artifacts/${{ env.APK_NAME }}"
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk "release-artifacts/${{ env.APK_NAME }}"
          else
            # Fallback to debug if release unavailable
            ./gradlew assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk "release-artifacts/${{ env.APK_NAME }}"
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: patchwork-${{ env.TAG_NAME }}-${{ github.sha }}
          path: release-artifacts/${{ env.APK_NAME }}
          retention-days: 90

      - name: Check if tag already exists
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: check_tag
        run: |
          if git rev-parse "${{ env.TAG_NAME }}" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Create and push git tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.TAG_EXISTS == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ env.TAG_NAME }}" -m "Release ${{ env.TAG_NAME }}"
          git push origin "${{ env.TAG_NAME }}"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Patchwork ${{ env.TAG_NAME }}
          make_latest: true
          draft: false
          prerelease: false
          body: |
            ## Patchwork ${{ env.TAG_NAME }}

            **Version Code:** ${{ env.VERSION_CODE }}
            **Commit:** ${{ github.sha }}

            ### Install
            1. Download `${{ env.APK_NAME }}` below
            2. Enable **Install from unknown sources** in your Android settings
            3. Install the APK and grant permissions as needed

            ### Features
            - 🛠️ **Tools**: Maps Power Saving, Travel Alarm, DIY Automation, Button Remap, App Freezing
            - 🔒 **Security**: App Lock, Screen Locked Security
            - 🎨 **Visuals**: Status Bar Icons, Notification Lighting, Dynamic Night Light
            - ⚡ **Quick Tiles**: 20+ system toggles
            - 🎹 **Extras**: Custom Keyboard, Watermark, Battery Monitor

            ### Requirements
            - Android 8.0+ (Android 13+ recommended for full feature support)
            - Optional: Shizuku or Root for advanced features

            ### Links
            - 📖 [Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)
            - 🐛 [Report Issues](https://github.com/${{ github.repository }}/issues)
            - 💬 [Telegram](https://t.me/tidwib)

            ---
            Built with ❤️ by [Tino Britty J](https://github.com/brittytino)
          files: release-artifacts/${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR with APK
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ APK built for this PR!\n\n**Version:** ${{ env.TAG_NAME }}\n\nDownload it from the artifacts section above.`
            })
